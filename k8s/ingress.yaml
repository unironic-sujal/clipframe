apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clipframe
  namespace: clipframe
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect:   "false"   # Set to "true" when TLS is configured
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
spec:
  # Uncomment and configure when a real domain + TLS cert is available:
  # tls:
  #   - hosts:
  #       - clipframe.app
  #     secretName: clipframe-tls
  rules:
    - host: clipframe.local    # Change to your real domain when deploying publicly
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clipframe
                port:
                  number: 80
---
# HorizontalPodAutoscaler — auto-scales pods based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clipframe
  namespace: clipframe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clipframe
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
