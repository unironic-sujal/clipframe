# ──────────────────────────────────────────────────────────────
# ClipFrame — Nginx Configuration
# Serves the static app with full security headers.
# Used inside the Docker container.
# ──────────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Charset ──────────────────────────────────────────────
    charset utf-8;

    # ── Security Headers ─────────────────────────────────────
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options   "nosniff"           always;

    # Prevent clickjacking
    add_header X-Frame-Options          "DENY"              always;

    # XSS protection (legacy browsers)
    add_header X-XSS-Protection         "1; mode=block"     always;

    # HSTS — enforce HTTPS (1 year). Enable when behind TLS termination.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Referrer policy
    add_header Referrer-Policy          "no-referrer"       always;

    # Permissions policy — disable unused browser features
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy
    # script-src 'self'         → only our own app.js
    # style-src  'self' + fonts → app CSS + Google Fonts stylesheet
    # font-src   fonts.gstatic  → Google Fonts font files
    # img-src    blob: data:    → filmstrip thumbnails (canvas dataURL) + blob
    # media-src  blob:          → video loaded via createObjectURL
    # connect-src 'none'        → no XHR/fetch/websockets
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' blob: data:; media-src 'self' blob:; connect-src 'none' https://vitals.vercel-insights.com https://va.vercel-analytics.com; object-src 'none'; frame-ancestors 'none';" always;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Caching ──────────────────────────────────────────────
    # HTML: no cache (always fresh)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
        # Re-apply security headers (nginx location blocks don't inherit)
        add_header X-Content-Type-Options  "nosniff"   always;
        add_header X-Frame-Options         "DENY"       always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' blob: data:; media-src 'self' blob:; connect-src 'none' https://vitals.vercel-insights.com https://va.vercel-analytics.com; object-src 'none'; frame-ancestors 'none';" always;
    }

    # Static assets: cache 1 year (use content hashing in filenames for cache-busting)
    location ~* \.(css|js|png|jpg|ico|svg|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Manifest: short cache
    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── SPA Fallback ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health Check Endpoint (for Kubernetes liveness probe) ─
    location = /health {
        access_log off;
        return 200 '{"status":"ok","app":"clipframe"}';
        add_header Content-Type application/json always;
    }

    # ── Block hidden files ───────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Error pages ──────────────────────────────────────────
    error_page 404 /index.html;
}
