# ──────────────────────────────────────────────────────────────
# ClipFrame — CD Pipeline
# Runs on push to main only.
# Builds Docker image → pushes to DockerHub → deploys to K8s.
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  — your DockerHub username
#   DOCKERHUB_TOKEN     — DockerHub access token (not password)
#   KUBECONFIG_DATA     — base64-encoded kubeconfig for your cluster
# ──────────────────────────────────────────────────────────────

name: CD

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/clipframe

jobs:
  # ── Job 1: Build & Push Docker image ───────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.sha.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Job 2: Deploy to Kubernetes ────────────────────────────
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image tag in deployment
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:sha-${{ needs.build-and-push.outputs.short-sha }}"
          sed -i "s|image: .*clipframe.*|image: $IMAGE|" k8s/deployment.yaml
          echo "Deploying image: $IMAGE"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/clipframe \
            -n clipframe \
            --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n clipframe
          kubectl get svc  -n clipframe
