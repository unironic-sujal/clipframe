# ──────────────────────────────────────────────────────────────
# ClipFrame — CI Pipeline
# Runs on every push and pull request.
# Validates HTML, builds Docker image, and confirms health.
# ──────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Validate source files ───────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for f in index.html style.css app.js manifest.json nginx.conf Dockerfile docker-compose.yml; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All required files present."

      - name: Validate HTML structure
        run: |
          # Check for innerHTML usage (security check)
          if grep -r "innerHTML" app.js; then
            echo "SECURITY: innerHTML found in app.js — use textContent or createElement instead"
            exit 1
          fi
          echo "No innerHTML usage found. Good."

          # Check CSP meta tag present
          if ! grep -q "Content-Security-Policy" index.html; then
            echo "WARNING: CSP meta tag not found in index.html"
            exit 1
          fi
          echo "CSP meta tag present. Good."

          # Check no hardcoded secrets pattern
          if grep -rE "(password|secret|api_key)\s*=\s*['\"][^'\"]{4,}" app.js 2>/dev/null; then
            echo "SECURITY: Possible hardcoded secret detected"
            exit 1
          fi
          echo "No hardcoded secrets detected. Good."

  # ── Job 2: Build Docker image ───────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false          # Don't push on CI — CD handles that
          tags: clipframe:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Run container and verify health
        run: |
          docker run -d --name clipframe-test -p 8080:80 clipframe:ci
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            docker logs clipframe-test
            exit 1
          fi
          echo "Health check passed: HTTP $STATUS"
          docker stop clipframe-test
          docker rm clipframe-test

      - name: Verify security headers
        run: |
          docker run -d --name clipframe-headers -p 8081:80 clipframe:ci
          sleep 5
          HEADERS=$(curl -sI http://localhost:8081/)
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "X-Content-Type-Options" || { echo "Missing X-Content-Type-Options"; exit 1; }
          echo "$HEADERS" | grep -qi "X-Frame-Options"       || { echo "Missing X-Frame-Options"; exit 1; }
          echo "Security headers verified."
          docker stop clipframe-headers
          docker rm clipframe-headers
